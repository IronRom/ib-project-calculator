services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-pir_calc}
      POSTGRES_USER: ${DB_USER:-pir_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pir_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pir_user} -d ${DB_NAME:-pir_calc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-pir_user}:${DB_PASSWORD:-pir_password}@db:5432/${DB_NAME:-pir_calc}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-chars-min}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 10080
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin12345!}
      UPLOADS_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  uploads_data:
